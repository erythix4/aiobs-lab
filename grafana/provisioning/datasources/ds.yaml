apiVersion: 1
datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: vm
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    jsonData:
      timeInterval: "5s"
      httpMethod: POST
    editable: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
